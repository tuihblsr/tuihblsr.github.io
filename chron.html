        <script>
            // document.getElementById("counter").innerHTML = "New text!";
            const test = document.querySelectorAll('*[id]')
            let ids = []
            let total = 0
            let count = 0
            for (let i = 0; i < test.length; i++) {
                const elementId = test[i].id;
                if (!isNaN(elementId) && elementId.trim() !== "") {
                    ids.push(elementId);
                    const numID = parseInt(elementId)
                    total += numID
                    count ++
                }
            }
            const average = total / count
            console.log(total)
            console.log(count)
            console.log(average)
            console.log(test)
            console.log(ids)
            document.getElementById("total").innerHTML = 
                `Total: ${total}`
            document.getElementById("average").innerHTML = 
                `Average: ${average.toFixed(0)}`
        </script>
